# .github/workflows/build.yml
name: Build Runner

on:
  push:
    branches: ["main"]
    paths:
      - 'DataSDI/**'
  pull_request:
    branches: ["main"]
    
env:
  SCHEME: DataSDI # Pastikan ini adalah nama skema macOS Anda

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4 # Gunakan versi terbaru dari actions/checkout

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Build macOS
        run: |
          xcodebuild build \
            -project "DataSDI.xcodeproj" \
            -scheme DataSDI \
            -archivePath "build/DataSDI.xcarchive" \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            OTHER_CODE_SIGN_FLAGS="--options=runtime"
